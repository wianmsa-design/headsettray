name: Build HeadsetTray

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build HeadsetTray.csproj --configuration Release --output publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeadsetTray
          path: publish/HeadsetTray.exe
          if-no-files-found: error
